<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-label="Cycle time by demand chart">
  <rect width="960" height="560" fill="white"/>
  <text x="64" y="54" font-family="Arial" font-size="24" font-weight="700" fill="#111827">Cycle time rises nonlinearly as demand approaches capacity</text>
  <text x="64" y="84" font-family="Arial" font-size="14" fill="#4b5563">Average and P90 cycle time under increasing synthetic order arrival rates.</text>
  <line x1="90" y1="460" x2="890" y2="460" stroke="#374151"/>
  <line x1="90" y1="120" x2="90" y2="460" stroke="#374151"/>
  <g font-family="Arial" font-size="12" fill="#6b7280">
    <text x="58" y="464">0</text><text x="52" y="396">30</text><text x="52" y="328">60</text><text x="52" y="260">90</text><text x="45" y="192">120</text><text x="45" y="124">150</text>
    <line x1="90" y1="392" x2="890" y2="392" stroke="#e5e7eb"/><line x1="90" y1="324" x2="890" y2="324" stroke="#e5e7eb"/><line x1="90" y1="256" x2="890" y2="256" stroke="#e5e7eb"/><line x1="90" y1="188" x2="890" y2="188" stroke="#e5e7eb"/><line x1="90" y1="120" x2="890" y2="120" stroke="#e5e7eb"/>
    <text x="120" y="488">0.65</text><text x="300" y="488">0.85</text><text x="480" y="488">1.05</text><text x="660" y="488">1.25</text><text x="840" y="488">1.45</text>
  </g>
  <polyline fill="none" stroke="#2563eb" stroke-width="3" points="140,441 320,430 500,397 680,343 860,271"/>
  <polyline fill="none" stroke="#dc2626" stroke-width="3" points="140,424 320,398 500,342 680,259 860,153"/>
  <g fill="#2563eb"><circle cx="140" cy="441" r="5"/><circle cx="320" cy="430" r="5"/><circle cx="500" cy="397" r="5"/><circle cx="680" cy="343" r="5"/><circle cx="860" cy="271" r="5"/></g>
  <g fill="#dc2626"><circle cx="140" cy="424" r="5"/><circle cx="320" cy="398" r="5"/><circle cx="500" cy="342" r="5"/><circle cx="680" cy="259" r="5"/><circle cx="860" cy="153" r="5"/></g>
  <rect x="665" y="110" width="210" height="58" fill="white" stroke="#d1d5db"/>
  <line x1="680" y1="130" x2="725" y2="130" stroke="#2563eb" stroke-width="3"/><text x="735" y="135" font-family="Arial" font-size="13" fill="#111827">Average cycle time</text>
  <line x1="680" y1="152" x2="725" y2="152" stroke="#dc2626" stroke-width="3"/><text x="735" y="157" font-family="Arial" font-size="13" fill="#111827">P90 cycle time</text>
  <text x="340" y="525" font-family="Arial" font-size="14" fill="#374151">Order arrival rate per minute</text>
  <text x="18" y="330" transform="rotate(-90 18 330)" font-family="Arial" font-size="14" fill="#374151">Cycle time minutes</text>
</svg>
