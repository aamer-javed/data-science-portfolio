<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-label="Dispatch policy comparison chart">
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="60" y="55" font-family="Arial" font-size="25" font-weight="700" fill="#111827">Dispatching policy comparison by average cycle time</text>
  <text x="60" y="88" font-family="Arial" font-size="15" fill="#4b5563">Synthetic replicated DES outputs. Lower average cycle time is better.</text>
  <line x1="95" y1="450" x2="890" y2="450" stroke="#374151" stroke-width="1.5"/>
  <line x1="95" y1="125" x2="95" y2="450" stroke="#374151" stroke-width="1.5"/>
  <g font-family="Arial" font-size="12" fill="#6b7280">
    <text x="66" y="454">0</text><text x="58" y="390">10</text><text x="58" y="326">20</text><text x="58" y="262">30</text><text x="58" y="198">40</text><text x="58" y="134">50</text>
    <line x1="95" y1="386" x2="890" y2="386" stroke="#e5e7eb"/><line x1="95" y1="322" x2="890" y2="322" stroke="#e5e7eb"/><line x1="95" y1="258" x2="890" y2="258" stroke="#e5e7eb"/><line x1="95" y1="194" x2="890" y2="194" stroke="#e5e7eb"/><line x1="95" y1="130" x2="890" y2="130" stroke="#e5e7eb"/>
  </g>
  <rect x="160" y="330" width="110" height="120" fill="#2563eb" rx="6"/><text x="166" y="475" font-family="Arial" font-size="12" fill="#374151">shortest queue</text><text x="184" y="322" font-family="Arial" font-size="14" fill="#111827">18.7</text>
  <rect x="330" y="319" width="110" height="131" fill="#2563eb" rx="6"/><text x="337" y="475" font-family="Arial" font-size="12" fill="#374151">nearest robot</text><text x="354" y="311" font-family="Arial" font-size="14" fill="#111827">20.4</text>
  <rect x="500" y="304" width="110" height="146" fill="#2563eb" rx="6"/><text x="510" y="475" font-family="Arial" font-size="12" fill="#374151">priority FIFO</text><text x="524" y="296" font-family="Arial" font-size="14" fill="#111827">22.8</text>
  <rect x="670" y="291" width="110" height="159" fill="#2563eb" rx="6"/><text x="713" y="475" font-family="Arial" font-size="12" fill="#374151">FIFO</text><text x="694" y="283" font-family="Arial" font-size="14" fill="#111827">24.9</text>
  <text x="342" y="530" font-family="Arial" font-size="14" fill="#111827">Assignment policy scenario</text>
  <text x="12" y="305" transform="rotate(-90 12,305)" font-family="Arial" font-size="14" fill="#111827">Average cycle time minutes</text>
</svg>
