<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-label="SLA attainment by scenario chart">
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="60" y="55" font-family="Arial" font-size="26" font-weight="700" fill="#111827">SLA attainment by operating scenario</text>
  <text x="60" y="88" font-family="Arial" font-size="15" fill="#4b5563">Percent of orders completed within the 20-minute SLA target in the simulated 8-hour shift.</text>
  <line x1="95" y1="450" x2="890" y2="450" stroke="#374151" stroke-width="1.5"/>
  <line x1="95" y1="125" x2="95" y2="450" stroke="#374151" stroke-width="1.5"/>
  <g font-family="Arial" font-size="12" fill="#6b7280">
    <text x="62" y="454">0%</text><text x="52" y="389">20%</text><text x="52" y="324">40%</text><text x="52" y="259">60%</text><text x="52" y="194">80%</text><text x="46" y="129">100%</text>
    <line x1="95" y1="385" x2="890" y2="385" stroke="#e5e7eb"/><line x1="95" y1="320" x2="890" y2="320" stroke="#e5e7eb"/><line x1="95" y1="255" x2="890" y2="255" stroke="#e5e7eb"/><line x1="95" y1="190" x2="890" y2="190" stroke="#e5e7eb"/><line x1="95" y1="125" x2="890" y2="125" stroke="#e5e7eb"/>
  </g>
  <g fill="#2563eb">
    <rect x="130" y="154" width="80" height="296" rx="6"/><rect x="250" y="226" width="80" height="224" rx="6"/><rect x="370" y="141" width="80" height="309" rx="6"/><rect x="490" y="203" width="80" height="247" rx="6"/><rect x="610" y="274" width="80" height="176" rx="6"/><rect x="730" y="138" width="80" height="312" rx="6"/>
  </g>
  <g font-family="Arial" font-size="13" font-weight="700" fill="#111827" text-anchor="middle"><text x="170" y="145">91%</text><text x="290" y="217">69%</text><text x="410" y="132">95%</text><text x="530" y="194">76%</text><text x="650" y="265">54%</text><text x="770" y="129">96%</text></g>
  <g font-family="Arial" font-size="12" fill="#111827" text-anchor="middle"><text x="170" y="472">Baseline</text><text x="290" y="472">Fleet 15</text><text x="410" y="472">Fleet 25</text><text x="530" y="472">Demand +25%</text><text x="650" y="472">Demand +50%</text><text x="770" y="472">Stations 6</text></g>
  <text x="400" y="520" font-family="Arial" font-size="15" fill="#374151">Scenario</text>
  <text x="-335" y="28" transform="rotate(-90)" font-family="Arial" font-size="15" fill="#374151">Orders meeting SLA</text>
  <rect x="540" y="365" width="320" height="65" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="560" y="390" font-family="Arial" font-size="14" font-weight="700" fill="#166534">Executive readout</text>
  <text x="560" y="410" font-family="Arial" font-size="13" fill="#14532d">Adding stations improves SLA more than simply adding robots once station capacity becomes constrained.</text>
</svg>
