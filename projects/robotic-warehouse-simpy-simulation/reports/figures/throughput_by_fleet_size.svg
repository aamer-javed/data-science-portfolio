<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-label="Throughput by fleet size chart">
  <rect width="960" height="560" fill="white"/>
  <text x="64" y="54" font-family="Arial" font-size="24" font-weight="700" fill="#111827">Throughput improves then plateaus as fleet size grows</text>
  <text x="64" y="84" font-family="Arial" font-size="14" fill="#4b5563">Five-replication synthetic DES sweep; demand and station capacity held constant.</text>
  <line x1="90" y1="460" x2="890" y2="460" stroke="#374151"/>
  <line x1="90" y1="130" x2="90" y2="460" stroke="#374151"/>
  <g font-family="Arial" font-size="12" fill="#6b7280">
    <text x="55" y="464">30</text><text x="55" y="398">40</text><text x="55" y="332">50</text><text x="55" y="266">60</text>
    <line x1="90" y1="394" x2="890" y2="394" stroke="#e5e7eb"/><line x1="90" y1="328" x2="890" y2="328" stroke="#e5e7eb"/><line x1="90" y1="262" x2="890" y2="262" stroke="#e5e7eb"/>
    <text x="120" y="488">12</text><text x="242" y="488">16</text><text x="364" y="488">20</text><text x="486" y="488">24</text><text x="608" y="488">28</text><text x="730" y="488">32</text><text x="850" y="488">40</text>
  </g>
  <polyline fill="none" stroke="#2563eb" stroke-width="3" points="130,421 252,371 374,342 496,329 618,326 740,325 862,324"/>
  <g fill="#2563eb">
    <circle cx="130" cy="421" r="5"/><circle cx="252" cy="371" r="5"/><circle cx="374" cy="342" r="5"/><circle cx="496" cy="329" r="5"/><circle cx="618" cy="326" r="5"/><circle cx="740" cy="325" r="5"/><circle cx="862" cy="324" r="5"/>
  </g>
  <text x="356" y="525" font-family="Arial" font-size="14" fill="#374151">Robot fleet size</text>
  <text x="18" y="320" transform="rotate(-90 18 320)" font-family="Arial" font-size="14" fill="#374151">Completed orders per hour</text>
  <text x="565" y="305" font-family="Arial" font-size="13" fill="#111827">Diminishing returns after ~24 robots</text>
</svg>
