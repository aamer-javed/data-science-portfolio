<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-label="Throughput by fleet size chart">
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="60" y="55" font-family="Arial" font-size="26" font-weight="700" fill="#111827">Throughput improves then plateaus as fleet size grows</text>
  <text x="60" y="88" font-family="Arial" font-size="15" fill="#4b5563">Simulated 8-hour robotic warehouse shift. Demand fixed at 0.80 orders/min and station count fixed at 4.</text>
  <line x1="95" y1="450" x2="890" y2="450" stroke="#374151" stroke-width="1.5"/>
  <line x1="95" y1="125" x2="95" y2="450" stroke="#374151" stroke-width="1.5"/>
  <g font-family="Arial" font-size="12" fill="#6b7280">
    <text x="66" y="454">0</text><text x="58" y="390">10</text><text x="58" y="326">20</text><text x="58" y="262">30</text><text x="58" y="198">40</text><text x="58" y="134">50</text>
    <line x1="95" y1="386" x2="890" y2="386" stroke="#e5e7eb"/><line x1="95" y1="322" x2="890" y2="322" stroke="#e5e7eb"/><line x1="95" y1="258" x2="890" y2="258" stroke="#e5e7eb"/><line x1="95" y1="194" x2="890" y2="194" stroke="#e5e7eb"/><line x1="95" y1="130" x2="890" y2="130" stroke="#e5e7eb"/>
  </g>
  <polyline points="160,274 285,199 410,169 535,140 660,136 785,135" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#2563eb" stroke="#ffffff" stroke-width="3"><circle cx="160" cy="274" r="7"/><circle cx="285" cy="199" r="7"/><circle cx="410" cy="169" r="7"/><circle cx="535" cy="140" r="7"/><circle cx="660" cy="136" r="7"/><circle cx="785" cy="135" r="7"/></g>
  <g font-family="Arial" font-size="13" fill="#111827" text-anchor="middle"><text x="160" y="472">10</text><text x="285" y="472">15</text><text x="410" y="472">20</text><text x="535" y="472">25</text><text x="660" y="472">30</text><text x="785" y="472">40</text></g>
  <g font-family="Arial" font-size="13" fill="#111827" text-anchor="middle"><text x="160" y="255">27.4</text><text x="285" y="181">39.2</text><text x="410" y="151">43.9</text><text x="535" y="122">48.5</text><text x="660" y="118">49.0</text><text x="785" y="117">49.2</text></g>
  <text x="425" y="520" font-family="Arial" font-size="15" fill="#374151">Robot fleet size</text>
  <text x="-350" y="28" transform="rotate(-90)" font-family="Arial" font-size="15" fill="#374151">Completed orders per hour</text>
  <rect x="570" y="385" width="280" height="55" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="590" y="410" font-family="Arial" font-size="14" font-weight="700" fill="#1d4ed8">Executive readout</text>
  <text x="590" y="430" font-family="Arial" font-size="13" fill="#1e3a8a">After ~25 robots, stations become the likely constraint.</text>
</svg>
