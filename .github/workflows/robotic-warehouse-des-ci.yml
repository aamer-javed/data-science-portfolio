name: Robotic Warehouse DES CI

on:
  pull_request:
    paths:
      - "projects/robotic-warehouse-simpy-simulation/**"
      - ".github/workflows/robotic-warehouse-des-ci.yml"
  push:
    branches:
      - main
    paths:
      - "projects/robotic-warehouse-simpy-simulation/**"
      - ".github/workflows/robotic-warehouse-des-ci.yml"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: projects/robotic-warehouse-simpy-simulation/requirements.txt

      - name: Install dependencies
        working-directory: projects/robotic-warehouse-simpy-simulation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint package
        working-directory: projects/robotic-warehouse-simpy-simulation
        run: ruff check src tests

      - name: Run unit tests
        working-directory: projects/robotic-warehouse-simpy-simulation
        run: pytest

      - name: Smoke-test experiment runner
        working-directory: projects/robotic-warehouse-simpy-simulation
        run: python -m warehouse_sim.experiments
